<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les meves tasques — TODOs Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        fons: '#f8fafc', targeta: '#ffffff', vora: '#e2e8f0',
        primari: '#2563eb', 'primari-fosc': '#1d4ed8', 'primari-suau': '#dbeafe',
        tinta: '#1e293b', suau: '#64748b',
        fet: '#16a34a', perill: '#dc2626'
      } } }
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-fons min-h-screen">
  <main class="max-w-xl mx-auto p-4">

    <header class="bg-primari text-white rounded-xl p-4 mb-6 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold">Les meves tasques</h1>
        <p id="comptador" class="text-sm text-white/80">2 pendents</p>
      </div>
      <a href="/login" id="boto-surt" class="text-sm text-white/80 hover:text-white transition-colors cursor-pointer">Surt</a>
    </header>

    <div class="bg-targeta rounded-xl shadow-sm border border-vora p-4 mb-6">
      <div class="flex gap-2">
        <input id="camp-tasca" type="text" placeholder="Escriu una tasca…" class="flex-1 border border-vora rounded-lg px-3 py-2 text-tinta placeholder-suau focus:outline-none focus:ring-2 focus:ring-primari focus:border-transparent">
        <button id="boto-afegir" class="bg-primari hover:bg-primari-fosc text-white font-medium px-4 py-2 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-primari-fosc">Afegir</button>
      </div>
      <p id="error-tasca" class="text-perill text-sm mt-1 hidden">Escriu alguna cosa abans d'afegir</p>
    </div>

    <div id="estat-carregant" class="text-suau text-center py-12 hidden" aria-live="polite">
      <p>Carregant tasques…</p>
    </div>

    <div id="estat-buit" class="text-suau text-center py-12 hidden" aria-live="polite">
      <p>Encara no hi ha tasques</p>
    </div>

    <div id="estat-error" class="text-perill text-center py-8 bg-perill/5 rounded-xl hidden" role="alert">
      <p>No s'han pogut carregar les tasques. Torna-ho a provar més tard.</p>
    </div>

    <ul id="llista" class="space-y-2"></ul>

  </main>

  <script src="app.js"></script>
</body>
</html>
